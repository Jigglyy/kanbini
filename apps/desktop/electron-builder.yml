# electron-builder config - M5-A (ADR-0039).
# Drives `pnpm --filter @kanbini/desktop run package[:dir]`.
# The `prepackage` script (scripts/prepackage.mjs) handles MCP build +
# Electron-ABI rebuild + electron-vite build first.

# Reverse-DNS application identifier. Used by Windows AppUserModelID,
# macOS bundle id, NSIS uninstaller registry key. Don't change after
# first ship - installers compare against the previous appId to
# decide upgrade-vs-fresh-install.
appId: app.kanbini.desktop
productName: Kanbini
copyright: "Copyright © 2026 Kanbini"

# Output goes to `apps/desktop/release/`. Ignored from git via
# `release/` in the desktop .gitignore.
directories:
  output: release
  # Where electron-builder looks for icons / NSIS scripts / entitlements.
  # Keep separate from `out/` (electron-vite's app build) so a clean
  # `pnpm clean` doesn't take icons with it.
  buildResources: build

# What goes INTO the asar archive. Default would pull in dev configs
# and source maps too - whitelist explicitly so the package stays
# tight and predictable. better-sqlite3 needs to be in node_modules
# AND asarUnpack'd (see below) so the native .node binding can be
# loaded at runtime (Node can't dlopen from inside an asar).
files:
  - out/**/*
  - package.json
  - "!**/*.map"
  - "!**/{.eslintrc,.prettierrc,tsconfig*.json,*.d.ts}"
  - "!**/{LICENSE,LICENCE,License,license,CHANGELOG*,README*,readme*,HISTORY*}"
  - "!**/{test,__tests__,tests,coverage,docs,doc,example,examples}/**"
  - "!**/{.bin,.cache,.github,.husky,.vscode}/**"
  - "!**/*.{ts,tsx,jsx}"

# The native binding lives at
# `node_modules/better-sqlite3/build/Release/better_sqlite3.node`.
# Node + Electron can't dlopen native modules from inside an asar
# archive, so unpack them to `app.asar.unpacked/` and let the loader
# find them through Electron's resolution rewrite.
asarUnpack:
  - "**/node_modules/better-sqlite3/**"

# Ship two folders outside the asar archive:
#  - `mcp/` - the MCP stdio server bundle, so Settings → MCP renders
#    a real `<resources>/mcp/index.js` users can paste into their
#    AI client. Resolved by `resolveMcpBundlePath` in main/index.ts.
#  - `drizzle/` - the committed Drizzle migrations. `openDatabase`
#    runs them on first launch + every schema-version bump; without
#    them shipped, the packaged app crashes on the first SQL call
#    with "Cannot find migrations folder." (Main resolves the path
#    via `process.resourcesPath/drizzle` when `app.isPackaged`; the
#    dev path stays a relative climb to `packages/db/drizzle`.)
extraResources:
  - from: ../mcp/dist
    to: mcp
    filter:
      - "**/*"
  - from: ../../packages/db/drizzle
    to: drizzle
    filter:
      - "**/*"
  # Bundled third-party license notices. Generated by
  # `pnpm --filter @kanbini/desktop run build:notices`; run that before
  # packaging (the file is gitignored). Settings → About opens it via
  # shell.openPath.
  - from: ../../NOTICES.md
    to: NOTICES.md

# Pull in the renderer's built assets. electron-vite emits the
# renderer into `out/renderer/` (configured in electron.vite.config.ts);
# `files` above already covers it but the `extraMetadata` here makes
# the packaged `main` field point at the bundled entry instead of the
# workspace source.
extraMetadata:
  main: ./out/main/index.js

# --- Windows ---------------------------------------------------------
# NSIS (installer) + portable (no-install single .exe). The portable
# build is useful for trying the app without writing to Program Files
# or registry - different userData path, so it's effectively a sandbox.
win:
  target:
    - target: nsis
      arch:
        - x64
    - target: portable
      arch:
        - x64
  # Signing intentionally not configured (ADR-0040 - ship unsigned
  # for v1). Windows SmartScreen will warn on first launch; download-
  # page guidance lives in docs/PACKAGING.md. Wire `signtoolOptions`
  # here later if a signing budget materialises (CSC_LINK /
  # CSC_KEY_PASSWORD env-var path is documented in PACKAGING.md too).

nsis:
  # Show the install-dir picker instead of a one-click silent install.
  # First-time users want to see where the app is going; subsequent
  # auto-updates can suppress this once update infra exists (post-M5).
  oneClick: false
  allowToChangeInstallationDirectory: true
  # Per-user install (no admin UAC prompt). Switches the install dir
  # to `%LOCALAPPDATA%\Programs\Kanbini` and the registry keys to
  # HKCU. Matches the offline-by-default ethos - installing a kanban
  # app shouldn't require elevation.
  perMachine: false
  # `deleteAppDataOnUninstall: false` (the electron-builder default)
  # means electron-builder's built-in cleanup leaves `%APPDATA%\Kanbini`
  # alone. The opt-in M5-B path (ADR-0049) is implemented by the
  # `customUnInstall` macro in `build/installer.nsh` instead - it
  # reads the user's choice from HKCU\Software\Kanbini and
  # conditionally RMDir's userData. Keeping electron-builder's
  # built-in delete OFF means OUR script is the single source of
  # truth for "is the data deleted?".
  deleteAppDataOnUninstall: false
  # Bring in the customUnInstall hook. Path is relative to
  # `directories.buildResources` (i.e. `apps/desktop/build/`).
  include: installer.nsh
  # Start-menu shortcut: always on (the standard Windows app-launcher
  # surface, expected by users; no config needed to remove it after
  # install other than dragging it out of the Start menu).
  # Desktop shortcut: electron-builder's `createDesktopShortcut` is
  # binary (true = always create, false = never) with no built-in
  # opt-in UI. We set it `false` here and ask the user via a YES/NO
  # MessageBox in `installer.nsh`'s customInstall macro (default
  # YES, so silent installs and Enter-through both keep the prior
  # always-create behaviour). The uninstall macro deletes the
  # shortcut on its own since electron-builder no longer tracks it.
  createDesktopShortcut: false
  createStartMenuShortcut: true

# --- macOS -----------------------------------------------------------
# Universal binary (one .dmg, runs on Intel + Apple Silicon). Building
# this from Windows isn't supported by electron-builder; needs to be
# run from a Mac host. Config lives here so the recipe is ready -
# M5-C will document the cross-build story alongside signing.
mac:
  target:
    - target: dmg
      arch:
        - universal
  category: public.app-category.productivity
  # macOS unsigned + un-notarized = Gatekeeper blocks the .app with
  # "developer cannot be verified" and no obvious bypass. Effectively
  # broken for non-technical users (ADR-0040). Mac is deferred from
  # the v1 release; recipe stays here for the day notarization
  # ($99/yr Apple Developer Program + Mac host) makes sense.

# --- Linux (best-effort, not in M5 scope) ----------------------------
# AppImage so a single self-contained binary works across distros
# without a packaging maintainer relationship. Not advertised in v1.
linux:
  target:
    - AppImage
  category: Office
