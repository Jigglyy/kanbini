<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Kanbini</title>
    <!-- Favicon: Vite picks this up from index.html, hashes the asset
         in production, and serves it from the renderer source in dev.
         The brand mark is regenerated by `pnpm --filter
         @kanbini/desktop run build:icons` (ADR-0051). -->
    <link rel="icon" type="image/png" href="/src/assets/logo.png" />
    <!-- Resolve the theme before any CSS/JS loads so the first paint is
         the right colour (no dark-flash when Light is selected). The
         renderer's useSettings hook takes over for runtime changes. -->
    <script>
      try {
        var t =
          JSON.parse(localStorage.getItem('kanbini.settings') || '{}').theme ||
          'system'
        var dark =
          t === 'dark' ||
          (t === 'system' &&
            matchMedia('(prefers-color-scheme: dark)').matches)
        document.documentElement.dataset.theme = dark ? 'dark' : 'light'
      } catch (e) {
        document.documentElement.dataset.theme = 'dark'
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
